name: atma_academy
description: ATMA Desktop App
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.0.0
  firebase_auth: ^4.0.0
  cloud_firestore: ^4.0.0
  firebase_storage: ^11.0.0
  http: ^1.0.0
  provider: ^6.0.0
  google_fonts: ^6.0.0

dev_dependencies:
  msix: ^3.16.0

flutter:
  uses-material-design: true

msix_config:
  display_name: ATMA Academy
  publisher_display_name: ATMA
  identity_name: com.atma.academy
  msix_version: 1.0.0.0